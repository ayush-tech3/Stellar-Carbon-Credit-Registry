name: CI — Lint, Test & Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '24'

jobs:
  # ─────────────────────────────────────────────
  # Rust / Soroban Contracts
  # ─────────────────────────────────────────────
  contracts:
    name: Contracts — fmt / clippy / test / build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      # Build retirement-manager WASM first — the carbon-credit-registry
      # crate uses contractimport! to embed this WASM at compile time.
      - name: Build retirement-manager WASM (dependency)
        run: cargo build --release --target wasm32-unknown-unknown -p retirement-manager

      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Build WASM (release)
        run: cargo build --release --target wasm32-unknown-unknown -p carbon-credit-registry

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contract-wasm
          path: |
            contracts/target/wasm32-unknown-unknown/release/retirement_manager.wasm
            contracts/target/wasm32-unknown-unknown/release/carbon_credit_registry.wasm

  # ─────────────────────────────────────────────
  # Next.js Frontend
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend — lint / test / build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test -- --run

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_STELLAR_NETWORK: testnet
          NEXT_PUBLIC_SOROBAN_RPC_URL: https://soroban-testnet.stellar.org
          NEXT_PUBLIC_NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"
          NEXT_PUBLIC_STELLAR_EXPLORER_URL: https://stellar.expert/explorer/testnet
          NEXT_PUBLIC_REGISTRY_CONTRACT_ID: ${{ vars.REGISTRY_CONTRACT_ID }}
          NEXT_PUBLIC_RETIREMENT_CONTRACT_ID: ${{ vars.RETIREMENT_CONTRACT_ID }}
